# nginx-proxy-exporter — minimal configuration
#
# This config runs the exporter in legacy mode with safe defaults:
#  - Emits the v0.8 metric set (nginx_log_*) MINUS path tracking
#  - No filesystem discovery
#  - Cardinality safety net at 50_000 series
#
# For richer setups (filesystem-based product/tenant discovery, declarative
# aggregations, custom log formats) see the examples/ directory.

listen:
  address: "127.0.0.1"
  port: 4040

log_file: "/var/log/nginx/access.json.log"

ssl:
  enabled: true
  check_interval: "1h"
  nginx_conf_dir: "/etc/nginx/sites-enabled"
  glob_patterns:
    - "/etc/letsencrypt/live/*/fullchain.pem"

# Histogram buckets used by the legacy metric set.
buckets:
  duration: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30, 60, 120]
  response_size: [100, 1000, 5000, 10000, 50000, 100000, 500000, 1000000, 5000000]

# Path tracking is OFF by default in v0.9+ because it can produce millions of
# series on busy multi-tenant proxies. To restore the v0.8 behaviour:
#
# metrics:
#   legacy:
#     track_paths: true
#     max_paths_global: 5000   # hard cap on distinct (server_name, path) pairs
